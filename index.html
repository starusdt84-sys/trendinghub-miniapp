<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>트렌딩 허브</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--tg-theme-bg-color,#0d0f14);color:var(--tg-theme-text-color,#e5e7eb);overflow-x:hidden}
  .header{position:sticky;top:0;z-index:100;background:var(--tg-theme-bg-color,#0d0f14);padding:12px 16px 0;border-bottom:0.5px solid rgba(255,255,255,.08)}
  .header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .logo{width:32px;height:32px;background:#7c3aed;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
  .header-info h1{font-size:15px;font-weight:600}
  .live-badge{display:flex;align-items:center;gap:4px;font-size:10px;color:#22c55e}
  .live-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:10px}
  .tabs::-webkit-scrollbar{display:none}
  .tab-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);cursor:pointer;flex-shrink:0}
  .tab-btn.active{background:#7c3aed;color:#fff}
  .content{padding:12px 16px;display:none}
  .content.active{display:block}
  .section-title{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px}
  .card{background:rgba(255,255,255,.04);border-radius:14px;padding:12px 14px;border:0.5px solid rgba(255,255,255,.07);margin-bottom:8px}
  .card.alert-green{border-color:rgba(34,197,94,.3)}
  .card.alert-red{border-color:rgba(239,68,68,.3)}
  .card.alert-purple{border-color:rgba(124,58,237,.4)}
  .row{display:flex;justify-content:space-between;align-items:center}
  .ticker{font-size:13px;font-weight:500}
  .price{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  .up{color:#22c55e}
  .down{color:#ef4444}
  .neutral{color:#eab308}
  .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
  .badge-green{background:rgba(34,197,94,.15);color:#22c55e}
  .badge-red{background:rgba(239,68,68,.15);color:#ef4444}
  .badge-yellow{background:rgba(234,179,8,.15);color:#eab308}
  .badge-purple{background:rgba(124,58,237,.15);color:#a78bfa}
  .badge-blue{background:rgba(59,130,246,.15);color:#60a5fa}
  .spark{height:36px;display:flex;align-items:flex-end;gap:2px;margin:8px 0}
  .spark-bar{flex:1;border-radius:2px 2px 0 0;min-height:3px;opacity:.8}
  .divider{height:0.5px;background:rgba(255,255,255,.07);margin:10px 0}
  .sub-text{font-size:11px;color:rgba(255,255,255,.4);line-height:1.5}
  .main-text{font-size:12px;font-weight:500;line-height:1.4}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}
  .stat-item{background:rgba(0,0,0,.2);border-radius:8px;padding:8px;text-align:center}
  .stat-value{font-size:14px;font-weight:600}
  .stat-label{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px}
  .progress-wrap{background:rgba(0,0,0,.3);border-radius:4px;height:7px;overflow:hidden;margin:6px 0}
  .progress-bar{height:7px;border-radius:4px}
  .progress-labels{display:flex;justify-content:space-between;font-size:9px;color:rgba(255,255,255,.3)}
  .alert-row{display:flex;gap:10px;align-items:flex-start}
  .alert-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .news-item{padding:10px 0;border-bottom:0.5px solid rgba(255,255,255,.06)}
  .news-item:last-child{border-bottom:none}
  .news-rank{font-size:11px;color:#eab308;font-weight:600;min-width:24px}
  .news-flag{font-size:15px}
  .news-title{font-size:12px;font-weight:500;line-height:1.4;flex:1}
  .news-meta{display:flex;gap:6px;align-items:center;margin-top:4px}
  .open-btn{width:100%;padding:10px;background:#7c3aed;border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;margin-top:10px}
  .yt-thumb{width:100%;height:80px;background:rgba(255,255,255,.04);border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;margin:8px 0}
  .play-btn{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
  .loading{text-align:center;padding:40px 0;color:rgba(255,255,255,.3);font-size:13px}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">T</div>
    <div class="header-info">
      <h1>트렌딩 허브</h1>
      <div class="live-badge"><span class="live-dot"></span>실시간 업데이트</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('coin')">🪙 코인</button>
    <button class="tab-btn" onclick="switchTab('stock')">📈 주식</button>
    <button class="tab-btn" onclick="switchTab('video')">🎬 영상</button>
    <button class="tab-btn" onclick="switchTab('news')">🌍 핫토픽</button>
  </div>
</div>

<!-- 코인 탭 -->
<div id="tab-coin" class="content active">
  <div class="section-title">실시간 시세</div>
  <div class="card" id="coin-prices"><div class="loading">로딩 중...</div></div>

  <div class="section-title">김치 프리미엄</div>
  <div class="card alert-purple" id="kimp-card"><div class="loading">로딩 중...</div></div>

  <div class="section-title">🐋 고래 경보</div>
  <div id="whale-cards"><div class="loading">로딩 중...</div></div>

  <div class="section-title">미청산 잔고 (OI)</div>
  <div class="card" id="oi-card"><div class="loading">로딩 중...</div></div>
</div>

<!-- 주식 탭 -->
<div id="tab-stock" class="content">
  <div class="section-title">글로벌 지수</div>
  <div class="card" id="stock-indices"><div class="loading">로딩 중...</div></div>

  <div class="section-title">🚨 내부자 거래</div>
  <div id="insider-cards"><div class="loading">로딩 중...</div></div>

  <div class="section-title">🏛 미 의원 주식 거래</div>
  <div id="congress-cards"><div class="loading">로딩 중...</div></div>
</div>

<!-- 영상 탭 -->
<div id="tab-video" class="content">
  <div class="section-title">🔥 지금 가장 뜨는 영상</div>
  <div id="video-cards"><div class="loading">로딩 중...</div></div>
</div>

<!-- 핫토픽 탭 -->
<div id="tab-news" class="content">
  <div class="section-title">🔥 전세계 지금 검색 폭발</div>
  <div class="card" id="trending-searches"><div class="loading">로딩 중...</div></div>

  <div class="section-title">😱 해외 지금 화제</div>
  <div id="news-cards"><div class="loading">로딩 중...</div></div>
</div>

<script>
  // 여기에 본인 YouTube API 키 입력
  const YT_API_KEY = "여기에_유튜브_API_키_입력";
</script>
<script src="app.js"></script>
</body>
</html>
